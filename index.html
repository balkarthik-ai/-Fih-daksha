<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hooked Harbor</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <h1>Hooked Harbor</h1>
      <p class="subtitle">Catch fish from your boat. Green is +2, yellow is 0, red is -2.</p>
      <canvas id="gameCanvas" width="900" height="540"></canvas>
      <div class="hud">
        <span>Score: <strong id="score">0</strong></span>
        <span>Goal: 10 points</span>
      </div>
      <p class="controls">Use ↑ ↓ ← → to move the hook. Press space to restart after the game ends.</p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
